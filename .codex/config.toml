# Codex Configuration for AI-Driven Development
# https://github.com/openai/codex

[codex]
# 承認ポリシー: never | on-failure | always
approval_policy = "never"

# サンドボックスモード: off | read-only | workspace-write
sandbox = "workspace-write"

# モデル設定
model = "o4-mini"

# 履歴を保存
history = true

[agents]
# 利用可能なエージェント
# 詳細は agents/*.md を参照
available = [
    "implementation-agent-typescript",
    "implementation-agent-python",
    "implementation-agent-csharp",
    "implementation-agent-java",
    "unit-test-agent",
    "e2e-test-agent",
    "code-review-agent"
]

[workspace]
# 作業ディレクトリ
root = "."

# 除外パターン
exclude = [
    "node_modules",
    ".git",
    "__pycache__",
    "*.pyc",
    "bin",
    "obj",
    "target",
    "dist",
    "build"
]

[security]
# 機密ファイルの除外
sensitive_patterns = [
    ".env",
    ".env.*",
    "*.key",
    "*.pem",
    "credentials.*",
    "secrets.*"
]